name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_SSH_KEY }}
          envs:     GH_PAT
          script: |
            set -e
            cd ~/ai-trading-expert
            git pull https://$GH_PAT@github.com/aapharvey/ai-trading-expert.git main
            sudo docker build -t btc-bot .
            sudo docker stop btc-bot || true
            sudo docker rm   btc-bot || true
            sudo docker run -d \
              --name btc-bot \
              --restart unless-stopped \
              --env-file .env \
              btc-bot
            echo "✅ Deploy complete — $(sudo docker inspect --format='{{.State.StartedAt}}' btc-bot)"
